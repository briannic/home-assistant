# ─────────────────────────────────────────────────────────────────────
# Water leak sensors (Aqara SJCGQ11LM). Leaks are time-critical, so these
# fire IMMEDIATELY (no `for:` debounce) via a high-priority Companion-app
# push (interruption-level: time-sensitive breaks through Focus/silent).
# Sonos TTS removed 2026-06-18 per preference — push only for now.
# Entity id standardized to binary_sensor.sump_pump_water_leak in the HA
# UI (HA defaults it to binary_sensor.0x..._moisture at discovery).
# ─────────────────────────────────────────────────────────────────────

# ── Sump pump ──
- id: sump_pump_leak_detected
  alias: "Sump pump leak detected → push (critical)"
  description: >
    Water at the basement sump pump. Fires the instant the sensor goes
    wet (no debounce). High-priority phone push (Sonos removed for now).
    Re-arms automatically when it dries out.
  trigger:
    - platform: state
      entity_id: binary_sensor.sump_pump_water_leak
      to: "on"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "💧 WATER LEAK — Sump pump"
        message: "Water detected at the basement sump pump. Check now."
        data:
          push:
            interruption-level: time-sensitive
          tag: sump_pump_leak
  mode: single

- id: sump_pump_leak_cleared
  alias: "Sump pump leak cleared → push"
  description: >
    The sump leak sensor dried out — follow-up so you know the water is
    gone. Push only (no Sonos).
  trigger:
    - platform: state
      entity_id: binary_sensor.sump_pump_water_leak
      to: "off"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "Sump leak cleared"
        message: "The sump pump leak sensor is dry again."
        data:
          push:
            tag: sump_pump_leak
  mode: single

# ── Basement floor ──
- id: basement_water_leak_detected
  alias: "Basement floor leak detected → push (critical)"
  description: >
    Water on the basement floor. Fires the instant the sensor goes wet
    (no debounce). High-priority phone push, no Sonos. Re-arms when dry.
  trigger:
    - platform: state
      entity_id: binary_sensor.basement_water_leak
      to: "on"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "💧 WATER LEAK — Basement floor"
        message: "Water detected on the basement floor. Check now."
        data:
          push:
            interruption-level: time-sensitive
          tag: basement_water_leak
  mode: single

- id: basement_water_leak_cleared
  alias: "Basement floor leak cleared → push"
  description: >
    The basement floor leak sensor dried out — follow-up so you know the
    water is gone. Push only.
  trigger:
    - platform: state
      entity_id: binary_sensor.basement_water_leak
      to: "off"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "Basement floor leak cleared"
        message: "The basement floor leak sensor is dry again."
        data:
          push:
            tag: basement_water_leak
  mode: single

# ─────────────────────────────────────────────────────────────────────
# Basement humidity (Ecowitt GW1100B channel 3). Above ~60% RH is the
# mold/mildew risk threshold for a basement.
# ─────────────────────────────────────────────────────────────────────
- id: basement_humidity_high
  alias: "Basement humidity ≥ 60% → push"
  description: >
    Alert when basement RH stays at or above 60% for 10 minutes (the
    mold-risk threshold). The 10-min debounce avoids firing on a momentary
    spike. Mode: single — won't re-fire while it stays high; re-arms once
    it drops back below 60%.
  trigger:
    - platform: numeric_state
      entity_id: sensor.gw1100b_humidity_3
      above: 60
      for: "00:10:00"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "Basement humidity high"
        message: >-
          Basement humidity is {{ states('sensor.gw1100b_humidity_3') }}%
          (≥60% — mold risk). Consider running a dehumidifier.
        data:
          push:
            tag: basement_humidity
  mode: single
