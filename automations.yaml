- id: nightly_backup_0300
  alias: "Nightly HA backup (03:00)"
  description: >
    Creates a full HA backup tarball under /config/backups/ each night
    at 03:00 local. Tarball includes the SQLite recorder DB, .storage/
    (owner account, OAuth tokens, area/entity registry), all YAML
    config, and integrations. Off-host shipping (rsync to S3 / hudson)
    happens via the huron-side cron in infra — see
    apps/home-assistant.md for the full backup pipeline.
  trigger:
    - platform: time
      at: "03:00:00"
  action:
    - service: backup.create
      data: {}
  mode: single

# ─────────────────────────────────────────────────────────────────────
# Door contact sensors (Aqara MCCGQ11LM via Z2M MQTT discovery).
# Each door pushes a HA Companion app notification if it stays open
# ≥ 1 minute. Channel switched from Pushover → mobile_app on 2026-06-17.
# NOTE: only Brian's iPhone is registered today; add a notify group
# once the spouse's phone is enrolled so both get alerted.
# Sonos TTS announcements were removed 2026-06-17 (too chatty across
# four doors). Entity IDs standardized to binary_sensor.<slug>_contact
# in the HA UI (Z2M renames don't change the IEEE-locked entity_id).
# ─────────────────────────────────────────────────────────────────────

- id: front_door_open_1min_pushover
  alias: "Front door open 1 min → Pushover"
  description: >
    If the front-door contact sensor stays open continuously for 1
    minute, send a Pushover alert to phone. Mode: single — won't
    re-fire while the door remains open.
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_contact
      to: "on"
      for: "00:01:00"
  action:
    - service: notify.mobile_app_brian_nicholss_iphone
      data:
        title: "Front door open"
        message: "The front door has been open for 1 minute."
  mode: single

