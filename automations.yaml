- id: nightly_backup_0300
  alias: "Nightly HA backup (03:00)"
  description: >
    Creates a full HA backup tarball under /config/backups/ each night
    at 03:00 local. Tarball includes the SQLite recorder DB, .storage/
    (owner account, OAuth tokens, area/entity registry), all YAML
    config, and integrations. Off-host shipping (rsync to S3 / hudson)
    happens via the huron-side cron in infra — see
    apps/home-assistant.md for the full backup pipeline.
  trigger:
    - platform: time
      at: "03:00:00"
  action:
    - service: backup.create
      data: {}
  mode: single

# ─────────────────────────────────────────────────────────────────────
# Door contact sensors (Aqara MCCGQ11LM via Z2M MQTT discovery).
# Each door gets the same three-automation pattern, cloned from the
# original front-door set:
#   <door>_opened_tts        open (1 s debounce) → Sonos TTS announce
#   <door>_open_1min_pushover open ≥ 1 min       → Pushover escalation
#   <door>_closed_tts        closed              → Sonos TTS announce
# Entity IDs were standardized to binary_sensor.<slug>_contact in the
# HA UI (Z2M renames don't change the IEEE-locked entity_id).
# ─────────────────────────────────────────────────────────────────────

# ── Front door ──
- id: front_door_opened_tts
  alias: "Front door opened → Sonos TTS"
  description: >
    Announce on the Sonos Move as soon as the front door opens (1 s
    debounce to avoid sensor flicker). Re-arms on close.
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_contact
      to: "on"
      for: "00:00:01"
  action:
    - service: tts.cloud_say
      data:
        entity_id: media_player.sonos_move
        message: "The front door is open."
  mode: single

- id: front_door_open_1min_pushover
  alias: "Front door open 1 min → Pushover"
  description: >
    If the front-door contact sensor stays open continuously for 1
    minute, send a Pushover alert to phone. Escalation after the
    immediate Sonos TTS. Mode: single — won't re-fire while the
    door remains open.
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_contact
      to: "on"
      for: "00:01:00"
  action:
    - service: notify.pushover
      data:
        title: "Front door open"
        message: "The front door has been open for 1 minute."
  mode: single

- id: front_door_closed_tts
  alias: "Front door closed → Sonos TTS"
  description: >
    Announce on the Sonos Move when the front door closes.
    Provides audible confirmation the door has been shut.
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_contact
      to: "off"
  action:
    - service: tts.cloud_say
      data:
        entity_id: media_player.sonos_move
        message: "The front door is closed."
  mode: single

